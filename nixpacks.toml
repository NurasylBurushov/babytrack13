[variables]
PYTHON_VERSION = "3.11"

[phases.setup]
# Добавили postgresql (для asyncpg) и openssl (для шифрования паролей в passlib)
nixPkgs = ["gcc", "postgresql", "openssl"]

[phases.install]
cmds = ["python3 -m pip install -r requirements.txt"]

[start]
cmd = "python3 -m uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
